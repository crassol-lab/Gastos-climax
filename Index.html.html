<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Gastos - Climax Service</title>

<style>
:root{
--blue:#003b8e;
--bg:#f0f2f7;
--card:#ffffff;
--text:#1a1a2e;
--border:#d9dfeb;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,sans-serif;
background:var(--bg);
color:var(--text);
}

header{
background:var(--blue);
color:white;
padding:20px;
text-align:center;
position:sticky;
top:0;
}

.container{
max-width:520px;
margin:auto;
padding:16px;
}

.card{
background:white;
padding:18px;
border-radius:16px;
margin-bottom:14px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card-title{
font-size:15px;
font-weight:bold;
margin-bottom:14px;
color:var(--blue);
}

input, textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-bottom:10px;
font-size:15px;
}

.gasto{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.gasto label{
flex:1;
font-size:14px;
}

.material{
background:#f7f8fb;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.btn-primary{
background:var(--blue);
color:white;
}

.btn-green{
background:#25d366;
color:white;
}

.total{
background:var(--blue);
color:white;
padding:18px;
border-radius:14px;
display:flex;
justify-content:space-between;
font-size:24px;
font-weight:bold;
margin-bottom:14px;
}

#resumen{
display:none;
white-space:pre-line;
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
margin-top:14px;
line-height:1.6;
}

.footer{
text-align:center;
font-size:12px;
color:#666;
padding:24px;
}
</style>
</head>

<body>

<header>
<h1>💸 Registro de Gastos</h1>
<div id="fecha"></div>
</header>

<div class="container">

<div class="card">
<div class="card-title">👤 Datos</div>

<input id="empleado" placeholder="Nombre del empleado">

<input id="trabajo" placeholder="Trabajo / Cliente">

<input type="date" id="fechaInput">
</div>

<div class="card">
<div class="card-title">🚗 Transporte</div>

<div class="gasto">
<label>Uber / Taxi</label>
<input type="number" id="uber" placeholder="0" oninput="calcularTotal()">
</div>

<div class="gasto">
<label>Combustible</label>
<input type="number" id="combustible" placeholder="0" oninput="calcularTotal()">
</div>

<div class="gasto">
<label>Estacionamiento</label>
<input type="number" id="estacionamiento" placeholder="0" oninput="calcularTotal()">
</div>

</div>

<div class="card">
<div class="card-title">🍔 Comida</div>

<input type="number" id="comida" placeholder="Monto comida" oninput="calcularTotal()">

<textarea id="detalleComida" placeholder="Detalle comida"></textarea>
</div>

<div class="card">
<div class="card-title">🔩 Materiales</div>

<div id="listaMateriales"></div>

<button type="button" class="btn-primary" onclick="agregarMaterial()">
+ Agregar material
</button>
</div>

<div class="card">
<div class="card-title">📋 Otros gastos</div>

<input type="number" id="otros" placeholder="0" oninput="calcularTotal()">

<textarea id="detalleOtros" placeholder="Detalle otros"></textarea>
</div>

<div class="total">
<span>TOTAL</span>
<span id="total">$0</span>
</div>

<button type="button" class="btn-primary" onclick="verResumen()">
📄 Ver resumen
</button>

<button type="button" class="btn-green" onclick="enviarWhatsApp()">
📲 Enviar por WhatsApp
</button>

<div id="resumen"></div>

<div class="footer">
Uso interno · Climax Service
</div>

</div>

<script>

document.getElementById('fecha').innerText =
new Date().toLocaleString('es-AR');

document.getElementById('fechaInput').value =
new Date().toISOString().split('T')[0];

function valor(id){
return Number(document.getElementById(id).value || 0);
}

function agregarMaterial(){

const contenedor = document.getElementById('listaMateriales');

const div = document.createElement('div');

div.className = 'material';

div.innerHTML = `
<input class="mat-desc" placeholder="Descripción material">

<input type="number"
class="mat-monto"
placeholder="Monto"
oninput="calcularTotal()">
`;

contenedor.appendChild(div);

}

function calcularTotal(){

let total = 0;

total += valor('uber');
total += valor('combustible');
total += valor('estacionamiento');
total += valor('comida');
total += valor('otros');

document.querySelectorAll('.mat-monto').forEach(item=>{
total += Number(item.value || 0);
});

document.getElementById('total').innerText =
'$' + total.toLocaleString('es-AR');

return total;

}

function generarTexto(){

let texto = '';

texto += '💸 REGISTRO DE GASTOS\n\n';

texto += '👤 Empleado: ' +
(document.getElementById('empleado').value || '-') + '\n';

texto += '🔧 Trabajo: ' +
(document.getElementById('trabajo').value || '-') + '\n';

texto += '📅 Fecha: ' +
(document.getElementById('fechaInput').value || '-') + '\n\n';

if(valor('uber')){
texto += '🚕 Uber/Taxi: $' + valor('uber') + '\n';
}

if(valor('combustible')){
texto += '⛽ Combustible: $' + valor('combustible') + '\n';
}

if(valor('estacionamiento')){
texto += '🅿️ Estacionamiento: $' + valor('estacionamiento') + '\n';
}

if(valor('comida')){
texto += '🍔 Comida: $' + valor('comida') + '\n';
}

document.querySelectorAll('.material').forEach(item=>{

const desc = item.querySelector('.mat-desc').value;
const monto = item.querySelector('.mat-monto').value;

if(desc || monto){
texto += '🔩 ' + (desc || 'Material') +
': $' + (monto || 0) + '\n';
}

});

if(valor('otros')){
texto += '📋 Otros: $' + valor('otros') + '\n';
}

texto += '\n💰 TOTAL: ' +
document.getElementById('total').innerText;

return texto;

}

function verResumen(){

const resumen = document.getElementById('resumen');

resumen.style.display = 'block';

resumen.innerText = generarTexto();

window.scrollTo({
top: document.body.scrollHeight,
behavior: 'smooth'
});

}

function enviarWhatsApp(){

const texto = encodeURIComponent(generarTexto());

window.open(
'https://wa.me/?text=' + texto,
'_blank'
);

}

calcularTotal();

</script>

</body>
</html>
