<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastos - Climax Service</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--blue:#003b8e;--accent:#0057d9;--gray:#f0f2f7;--white:#fff;--text:#1a1a2e;--muted:#6b7280;--border:#dde2ec;--green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:var(--gray);color:var(--text);padding-bottom:40px;}
header{background:var(--blue);color:white;padding:20px;text-align:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,59,142,.25);}
header h1{font-size:20px;font-weight:700;}
.fh{font-family:"DM Mono",monospace;font-size:12px;opacity:.75;margin-top:4px;}
.container{max-width:500px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
.card{background:var(--white);border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,59,142,.10);border:1px solid var(--border);}
.card-cobro{background:var(--green-light);border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(22,163,74,.10);border:2px solid var(--green-border);}
.ct{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.ct-green{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--green);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.ct-sub{font-size:12px;color:var(--green);opacity:.8;margin-bottom:14px;padding-left:30px;}
.num{background:var(--blue);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.num-green{background:var(--green);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
input,textarea,select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:"DM Sans",sans-serif;color:var(--text);background:#fafbff;margin-bottom:10px;appearance:none;-webkit-appearance:none;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);background:#fff;}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.two-col label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.two-col input{margin-bottom:0;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.row label{font-size:14px;font-weight:500;flex:1;}
.mw{position:relative;width:130px;flex-shrink:0;}
.mw input{margin-bottom:0;padding-left:26px;}
.mw::before{content:"$";position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;font-weight:600;z-index:1;pointer-events:none;}
.mw-full{position:relative;margin-bottom:10px;}
.mw-full input{margin-bottom:0;padding-left:26px;}
.mw-full::before{content:"$";position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;font-weight:600;z-index:1;pointer-events:none;}
.mi{background:var(--gray);border-radius:12px;padding:14px;margin-bottom:10px;position:relative;}
.mi input{margin-bottom:8px;background:white;}
.mi input:last-child{margin-bottom:0;}
.rm{position:absolute;top:10px;right:10px;background:#fee2e2;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;color:#dc2626;font-size:14px;font-weight:bold;display:flex;align-items:center;justify-content:center;}
.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:1.5px dashed var(--border);border-radius:10px;background:transparent;font-size:14px;font-family:"DM Sans",sans-serif;font-weight:600;color:var(--accent);cursor:pointer;margin-top:4px;}
.sw{position:relative;margin-bottom:10px;}
.sw select{margin-bottom:0;}
.sw::after{content:"v";position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);}
.total-box{background:var(--blue);color:white;border-radius:14px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;}
.tl{font-size:14px;font-weight:600;opacity:.85;}
.tn{font-family:"DM Mono",monospace;font-size:26px;font-weight:700;}
.btns{display:flex;flex-direction:column;gap:10px;}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;border:none;border-radius:12px;font-size:15px;font-family:"DM Sans",sans-serif;font-weight:700;cursor:pointer;}
.bg{background:#25d366;color:white;}
.br{background:transparent;color:var(--muted);border:1.5px solid var(--border);font-size:14px;padding:12px;}
.footer{text-align:center;font-size:12px;color:var(--muted);margin-top:6px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:white;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:500;z-index:200;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.cobro-input{background:white;border:1.5px solid var(--green-border) !important;}
.cobro-input:focus{border-color:var(--green) !important;}
</style>
</head>
<body>
<header>
  <img src="logo.png" alt="Climax" style="height:48px;display:block;margin:0 auto 6px;">
  <h1>💸 Registro de Gastos</h1>
  <div class="fh" id="fh">-</div>
</header>
<div class="container">
  <div class="card">
    <div class="ct"><span class="num">1</span> Empleado</div>
    <div class="sw">
      <select id="empleado">
        <option value="">Seleccionar empleado</option>
        <option>Brian</option>
        <option>Leonel</option>
        <option>Antonella</option>
        <option>Lionel</option>
        <option>Hector</option>
        <option>Oficina</option>
      </select>
    </div>
    <div class="two-col">
      <div><label>Fecha</label><input type="date" id="fecha"></div>
      <div><label>Trabajo / Cliente</label><input id="trabajo" placeholder="Ej: Carla Rassol" autocomplete="off"></div>
    </div>
  </div>
  <div class="card">
    <div class="ct"><span class="num">2</span> 🚗 Transporte</div>
    <div class="row"><label>🚕 Uber / Taxi</label><div class="mw"><input type="number" id="uber" placeholder="0" oninput="calcular()"></div></div>
    <div class="row"><label>⛽ Combustible</label><div class="mw"><input type="number" id="comb" placeholder="0" oninput="calcular()"></div></div>
    <div class="row"><label>🅿️ Estacionamiento</label><div class="mw"><input type="number" id="estac" placeholder="0" oninput="calcular()"></div></div>
    <div class="row"><label>🚌 Transporte publico</label><div class="mw"><input type="number" id="pub" placeholder="0" oninput="calcular()"></div></div>
  </div>
  <div class="card">
    <div class="ct"><span class="num">3</span> 🍔 Comida</div>
    <div class="row"><label>🍽️ Almuerzo / Cena</label><div class="mw"><input type="number" id="comida" placeholder="0" oninput="calcular()"></div></div>
  </div>
  <div class="card">
    <div class="ct"><span class="num">4</span> 🔩 Materiales comprados</div>
    <div id="matList"></div>
    <button class="add-btn" onclick="addMat()">+ Agregar material</button>
  </div>
  <div class="card">
    <div class="ct"><span class="num">5</span> 📦 Otros gastos</div>
    <div id="otroList"></div>
    <button class="add-btn" onclick="addOtro()">+ Agregar otro gasto</button>
  </div>
  <div class="card">
    <div class="ct"><span class="num">6</span> 🔁 Traspaso de dinero a empleado</div>
    <div class="mw-full"><input type="number" id="traspasoMonto" placeholder="Monto" oninput="calcular()"></div>
    <div class="sw">
      <select id="traspasoDetalle">
        <option value="">Seleccionar empleado</option>
        <option>Brian</option>
        <option>Leonel</option>
        <option>Antonella</option>
        <option>Lionel</option>
        <option>Hector</option>
        <option>Oficina</option>
      </select>
    </div>
  </div>
  <div class="total-box">
    <span class="tl">TOTAL GASTOS</span>
    <span class="tn" id="tn">$0</span>
  </div>
  <div class="card-cobro">
    <div class="ct-green"><span class="num-green">7</span> 💰 ¿El cliente te pagó?</div>
    <div class="ct-sub">Solo completá esto si cobraste plata del cliente en este service</div>
    <input id="cobroCliente" class="cobro-input" placeholder="Nombre del cliente" autocomplete="off">
    <div class="mw-full"><input type="number" id="cobroMonto" class="cobro-input" placeholder="Monto cobrado al cliente" oninput="calcular()"></div>
    <div class="sw"><select id="cobroMedio" class="cobro-input"><option value="">Medio de pago del cliente</option><option>Mercado Pago</option><option>Transferencia</option><option>Efectivo</option></select></div>
  </div>
  <div class="card" style="padding:16px">
    <div class="btns">
      <button class="btn bg" onclick="enviarWsp()"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> Enviar por WhatsApp</button>
      <button class="btn br" onclick="reset()">🔄 Nuevo registro</button>
    </div>
  </div>
  <div class="footer">Uso interno - Climax Service</div>
</div>
<div class="toast" id="toast"></div>
<script>
var mc = 0;
var oc = 0;
var yaEnviado = false;

function ini() {
  var a = new Date();
  var d = ["domingo","lunes","martes","miercoles","jueves","viernes","sabado"];
  var mo = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  document.getElementById("fh").textContent = d[a.getDay()] + " " + a.getDate() + " de " + mo[a.getMonth()] + " " + a.getFullYear();
  var h = new Date();
  document.getElementById("fecha").value = h.getFullYear() + "-" + pad(h.getMonth()+1) + "-" + pad(h.getDate());
}
function pad(n) { return String(n).padStart(2,"0"); }
ini();
setInterval(ini, 60000);

function gf() {
  var v = document.getElementById("fecha").value;
  if (!v) return "";
  var p = v.split("-");
  return p[2] + "/" + p[1] + "/" + p[0];
}
function gv(id) { return parseFloat(document.getElementById(id).value) || 0; }
function fmt(n) { return "$" + Math.round(n).toLocaleString("es-AR"); }

function calcular() {
  var t = gv("uber") + gv("comb") + gv("estac") + gv("pub") + gv("comida");
  var ms = document.querySelectorAll(".mm");
  for (var i = 0; i < ms.length; i++) t += parseFloat(ms[i].value) || 0;
  var os = document.querySelectorAll(".om");
  for (var i = 0; i < os.length; i++) t += parseFloat(os[i].value) || 0;
  document.getElementById("tn").textContent = fmt(t);
  return t;
}

function addMat() {
  mc++;
  var d = document.createElement("div");
  d.className = "mi";
  d.id = "mi" + mc;
  var btn = document.createElement("button");
  btn.className = "rm";
  btn.textContent = "X";
  (function(el){ btn.onclick = function() { el.remove(); calcular(); }; })(d);
  var inp1 = document.createElement("input");
  inp1.placeholder = "Descripcion del material";
  inp1.className = "md";
  inp1.autocomplete = "off";
  var wrap = document.createElement("div");
  wrap.className = "mw";
  wrap.style.width = "100%";
  var inp2 = document.createElement("input");
  inp2.type = "number";
  inp2.placeholder = "0";
  inp2.className = "mm";
  inp2.style.paddingLeft = "26px";
  inp2.oninput = calcular;
  wrap.appendChild(inp2);
  d.appendChild(btn);
  d.appendChild(inp1);
  d.appendChild(wrap);
  document.getElementById("matList").appendChild(d);
}

function addOtro() {
  oc++;
  var d = document.createElement("div");
  d.className = "mi";
  d.id = "oi" + oc;
  var btn = document.createElement("button");
  btn.className = "rm";
  btn.textContent = "X";
  (function(el){ btn.onclick = function() { el.remove(); calcular(); }; })(d);
  var inp1 = document.createElement("input");
  inp1.placeholder = "Descripcion del gasto";
  inp1.className = "od";
  inp1.autocomplete = "off";
  var wrap = document.createElement("div");
  wrap.className = "mw";
  wrap.style.width = "100%";
  var inp2 = document.createElement("input");
  inp2.type = "number";
  inp2.placeholder = "0";
  inp2.className = "om";
  inp2.style.paddingLeft = "26px";
  inp2.oninput = calcular;
  wrap.appendChild(inp2);
  d.appendChild(btn);
  d.appendChild(inp1);
  d.appendChild(wrap);
  document.getElementById("otroList").appendChild(d);
}

function getMats() {
  var r = [];
  var items = document.querySelectorAll("#matList .mi");
  for (var i = 0; i < items.length; i++) {
    var desc = items[i].querySelector(".md").value.trim();
    var monto = parseFloat(items[i].querySelector(".mm").value) || 0;
    if (desc || monto) r.push({d: desc || "Sin descripcion", m: monto});
  }
  return r;
}

function getOtros() {
  var r = [];
  var items = document.querySelectorAll("#otroList .mi");
  for (var i = 0; i < items.length; i++) {
    var desc = items[i].querySelector(".od").value.trim();
    var monto = parseFloat(items[i].querySelector(".om").value) || 0;
    if (desc || monto) r.push({d: desc || "Sin descripcion", m: monto});
  }
  return r;
}

function getDatos() {
  var emp = document.getElementById("empleado").value;
  var trab = document.getElementById("trabajo").value.trim();
  var mats = getMats();
  var otros = getOtros();
  var uber = gv("uber"), co = gv("comb"), es = gv("estac"), pu = gv("pub");
  var transp = uber + co + es + pu;
  var comida = gv("comida");
  var mt = 0;
  for (var i = 0; i < mats.length; i++) mt += mats[i].m;
  var ot = 0;
  for (var i = 0; i < otros.length; i++) ot += otros[i].m;
  var total = transp + comida + mt + ot;
  var traspasoMonto = gv("traspasoMonto");
  var traspasoDetalle = document.getElementById("traspasoDetalle").value;
  var cobroCliente = document.getElementById("cobroCliente").value.trim();
  var cobroMonto = gv("cobroMonto");
  var cobroMedio = document.getElementById("cobroMedio").value;
  return { emp:emp, trab:trab, mats:mats, otros:otros,
           uber:uber, co:co, es:es, pu:pu, transp:transp, comida:comida,
           mt:mt, ot:ot, total:total,
           traspasoMonto:traspasoMonto, traspasoDetalle:traspasoDetalle,
           cobroCliente:cobroCliente, cobroMonto:cobroMonto, cobroMedio:cobroMedio };
}

function enviarWsp() {
  var emp = document.getElementById("empleado").value;
  if (!emp) { toast("⚠️ Seleccioná un empleado"); return; }
  if (yaEnviado) { toast("Ya fue enviado. Tocá Nuevo registro para cargar otro."); return; }

  var o = getDatos();
  if (o.total === 0 && o.cobroMonto === 0) { toast("⚠️ Ingresá al menos un monto"); return; }

  var m = "*📱 REGISTRO DE GASTOS - CLIMAX*\n";
  m += "📅 Fecha: " + gf() + "\n";
  m += "\n👤 Empleado: *" + o.emp + "*\n";
  if (o.trab) m += "🏷 Trabajo/Cliente: " + o.trab + "\n";
  if (o.transp > 0) {
    m += "\n🚗 *Transporte:*\n";
    if (o.uber) m += "   🚕 Uber/Taxi: " + fmt(o.uber) + "\n";
    if (o.co) m += "   ⛽ Combustible: " + fmt(o.co) + "\n";
    if (o.es) m += "   🅿️ Estacionamiento: " + fmt(o.es) + "\n";
    if (o.pu) m += "   🚌 Transp. publico: " + fmt(o.pu) + "\n";
    m += "   *Subtotal: " + fmt(o.transp) + "*\n";
  }
  if (o.comida > 0) m += "\n🍔 *Comida:* " + fmt(o.comida) + "\n";
  if (o.mats.length > 0) {
    m += "\n🔩 *Materiales:*\n";
    for (var i = 0; i < o.mats.length; i++) m += "   " + o.mats[i].d + ": " + fmt(o.mats[i].m) + "\n";
    m += "   *Subtotal: " + fmt(o.mt) + "*\n";
  }
  if (o.otros.length > 0) {
    m += "\n📦 *Otros:*\n";
    for (var i = 0; i < o.otros.length; i++) m += "   " + o.otros[i].d + ": " + fmt(o.otros[i].m) + "\n";
    m += "   *Subtotal: " + fmt(o.ot) + "*\n";
  }
  m += "\n\n💰 *TOTAL GASTOS: " + fmt(o.total) + "*";
  if (o.traspasoMonto > 0) {
    m += "\n\n🔁 *TRASPASO DE DINERO:* " + fmt(o.traspasoMonto);
    if (o.traspasoDetalle) m += "\n   A: " + o.traspasoDetalle;
  }
  if (o.cobroMonto > 0) {
    m += "\n\n✅ *COBRO AL CLIENTE:* " + fmt(o.cobroMonto);
    if (o.cobroCliente) m += "\n   Cliente: " + o.cobroCliente;
    if (o.cobroMedio) m += "\n   Medio: " + o.cobroMedio;
  }

  window.open("https://wa.me/?text=" + encodeURIComponent(m), "_blank");

  yaEnviado = true;

  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyIF1-gdPJU41pJLZaAG1IhgYTlEvrUltcu2OqBappTz4Hni9GBMPg2ODHfQu23SikF/exec';

  var otDesc = o.otros.map(function(x){ return x.d; }).join(' / ');
  var filaG = [
    gf(), '', o.emp,
    o.uber > 0 ? o.uber : '',
    o.co > 0 ? o.co : '',
    o.es > 0 ? o.es : '',
    o.pu > 0 ? o.pu : '',
    o.comida > 0 ? o.comida : '',
    o.mt > 0 ? o.mt : '',
    otDesc || '',
    o.ot > 0 ? o.ot : '',
    o.traspasoMonto > 0 ? o.traspasoMonto : '',
    o.traspasoDetalle, o.total, ''
  ];

  if (o.total > 0) {
    fetch(SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ hoja: 'gastos', fila: filaG })
    }).catch(function() {});
  }

  if (o.cobroMonto > 0) {
    var filaC = [
      gf(), o.emp,
      o.cobroCliente || o.trab,
      o.cobroMonto,
      o.cobroMedio
    ];
    fetch(SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ hoja: 'cobros', fila: filaC })
    }).catch(function() {});
  }

  toast("✅ Enviado correctamente");
}

function reset() {
  document.getElementById("empleado").value = "";
  var ids = ["trabajo","cobroCliente"];
  for (var i = 0; i < ids.length; i++) document.getElementById(ids[i]).value = "";
  var ns = ["uber","comb","estac","pub","comida","traspasoMonto","cobroMonto"];
  for (var i = 0; i < ns.length; i++) document.getElementById(ns[i]).value = "";
  document.getElementById("traspasoDetalle").value = "";
  document.getElementById("cobroMedio").value = "";
  document.getElementById("matList").innerHTML = "";
  document.getElementById("otroList").innerHTML = "";
  mc = 0;
  oc = 0;
  yaEnviado = false;
  ini();
  calcular();
  toast("Formulario reiniciado");
}

function toast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 2500);
}
</script>
</body>
</html>
