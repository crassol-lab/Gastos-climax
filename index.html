<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastos - Climax Service</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--blue:#003b8e;--accent:#0057d9;--gray:#f0f2f7;--white:#fff;--text:#1a1a2e;--muted:#6b7280;--border:#dde2ec;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:var(--gray);color:var(--text);padding-bottom:40px;}
header{background:var(--blue);color:white;padding:20px;text-align:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,59,142,.25);}
header h1{font-size:20px;font-weight:700;}
.fh{font-family:"DM Mono",monospace;font-size:12px;opacity:.75;margin-top:4px;}
.container{max-width:500px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
.card{background:var(--white);border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,59,142,.10);border:1px solid var(--border);}
.ct{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.num{background:var(--blue);color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
input,textarea,select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:"DM Sans",sans-serif;color:var(--text);background:#fafbff;margin-bottom:10px;appearance:none;-webkit-appearance:none;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);background:#fff;}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.two-col label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.two-col input{margin-bottom:0;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.row label{font-size:14px;font-weight:500;flex:1;}
.mw{position:relative;width:130px;flex-shrink:0;}
.mw input{margin-bottom:0;padding-left:26px;}
.mw::before{content:"$";position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;font-weight:600;z-index:1;pointer-events:none;}
.mw-full{position:relative;margin-bottom:10px;}
.mw-full input{margin-bottom:0;padding-left:26px;}
.mw-full::before{content:"$";position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;font-weight:600;z-index:1;pointer-events:none;}
.mi{background:var(--gray);border-radius:12px;padding:14px;margin-bottom:10px;position:relative;}
.mi input{margin-bottom:8px;background:white;}
.mi input:last-child{margin-bottom:0;}
.rm{position:absolute;top:10px;right:10px;background:#fee2e2;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;color:#dc2626;font-size:14px;font-weight:bold;display:flex;align-items:center;justify-content:center;}
.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:1.5px dashed var(--border);border-radius:10px;background:transparent;font-size:14px;font-family:"DM Sans",sans-serif;font-weight:600;color:var(--accent);cursor:pointer;margin-top:4px;}
.sw{position:relative;margin-bottom:10px;}
.sw select{margin-bottom:0;}
.sw::after{content:"v";position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);}
.total-box{background:var(--blue);color:white;border-radius:14px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;}
.tl{font-size:14px;font-weight:600;opacity:.85;}
.tn{font-family:"DM Mono",monospace;font-size:26px;font-weight:700;}
.btns{display:flex;flex-direction:column;gap:10px;}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;border:none;border-radius:12px;font-size:15px;font-family:"DM Sans",sans-serif;font-weight:700;cursor:pointer;}
.bb{background:var(--blue);color:white;}
.bg{background:#25d366;color:white;}
.br{background:transparent;color:var(--muted);border:1.5px solid var(--border);font-size:14px;padding:12px;}
.ov{display:none;position:fixed;inset:0;background:rgba(10,20,50,.55);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
.ov.open{display:flex;}
.modal{background:white;border-radius:22px 22px 0 0;padding:28px 22px 36px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:up .25s ease;}
@keyframes up{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.mh h2{font-size:17px;font-weight:700;color:var(--blue);}
.xb{background:var(--gray);border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;color:var(--muted);}
.bl{background:var(--gray);border-radius:12px;padding:14px 16px;margin-bottom:12px;font-size:14px;line-height:1.7;}
.bl strong{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:4px;}
.bt{background:var(--blue);color:white;border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.bt span{font-size:13px;opacity:.85;}
.bt strong{font-family:"DM Mono",monospace;font-size:22px;font-weight:700;}
.footer{text-align:center;font-size:12px;color:var(--muted);margin-top:6px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:white;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:500;z-index:200;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>

</header>
<div class="container">
  <div class="card">
    <div class="ct"><span class="num">1</span> Datos</div>
    <input id="empleado" placeholder="Nombre del empleado" autocomplete="off">
    <div class="two-col">
      <div><label>Fecha</label><input type="date" id="fecha"></div>
      <div><label>Trabajo / Cliente</label><input id="trabajo" placeholder="Ej: Carla Rassol" autocomplete="off"></div>
    </div>
  </div>
  <div class="card">
    <div class="ct"><span class="num">2</span> 🚗 Transporte</div>
    <div class="row"><label>🚕 Uber / Taxi</label><div class="mw"><input type="number" id="uber" placeholder="0" oninput="calcular()"></div></div>
    <div class="row"><label>⛽ Combustible</label><div class="mw"><input type="number" id="comb" placeholder="0" oninput="calcular()"></div></div>
    <div class="row"><label>🅿️ Estacionamiento</label><div class="mw"><input type="number" id="estac" placeholder="0" oninput="calcular()"></div></div>
    <div class="row"><label>🚌 Transporte publico</label><div class="mw"><input type="number" id="pub" placeholder="0" oninput="calcular()"></div></div>
  </div>
  <div class="card">
    <div class="ct"><span class="num">3</span> 🍔 Comida</div>
    <div class="row"><label>🍽️ Almuerzo / Cena</label><div class="mw"><input type="number" id="comida" placeholder="0" oninput="calcular()"></div></div>
  </div>
  <div class="card">
    <div class="ct"><span class="num">4</span> 🔩 Materiales comprados</div>
    <div id="matList"></div>
    <button class="add-btn" onclick="addMat()">+ Agregar material</button>
  </div>
  <div class="card">
    <div class="ct"><span class="num">5</span> 📋 Otros gastos</div>
    <div class="row"><label>📝 Otros</label><div class="mw"><input type="number" id="otros" placeholder="0" oninput="calcular()"></div></div>
    <textarea id="otrosDesc" placeholder="Detalle (opcional)..." rows="2" style="margin-top:4px"></textarea>
  </div>
  <div class="total-box">
    <span class="tl">TOTAL GASTOS</span>
    <span class="tn" id="tn">$0</span>
  </div>
  <div class="card">
    <div class="ct"><span class="num">6</span> 💳 Pago con</div>
    <div class="sw"><select id="medio"><option value="">Seleccionar medio de pago</option><option>Mercado Pago</option><option>Transferencia</option><option>Efectivo</option></select></div>
    <div class="mw-full"><input type="number" id="pagaMonto" placeholder="Monto pagado"></div>
    <textarea id="pagoDesc" placeholder="Detalle del pago (opcional)..." rows="2"></textarea>
  </div>
  <div class="card" style="padding:16px">
    <div class="btns">
      <button class="btn bb" onclick="verResumen()">📋 Ver resumen</button>

    </div>
  </div>
  <div class="footer">Uso interno - Climax Service</div>
</div>
<div class="ov" id="ov" onclick="if(event.target===this)cerrar()">
  <div class="modal">
    <div class="mh"><h2>Resumen de gastos</h2><button class="xb" onclick="cerrar()">X</button></div>
