<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Climax Service</title>
<link rel="apple-touch-icon" href="../climaxlogoicono.jpg">
<link rel="manifest" href="../manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Arial",sans-serif;background:#003b8e;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.logo{margin-bottom:32px;text-align:center;}
.subtitulo{color:rgba(255,255,255,0.5);font-size:13px;font-weight:700;letter-spacing:6px;text-transform:uppercase;margin-top:4px;}
.apps{display:flex;flex-direction:column;gap:16px;width:100%;max-width:340px;}
.app-btn{display:flex;align-items:center;gap:18px;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);border-radius:18px;padding:20px 24px;text-decoration:none;color:white;transition:background .15s;}
.app-btn:active{background:rgba(255,255,255,0.2);}
.app-icon{font-size:32px;flex-shrink:0;}
.app-info{}
.app-nombre{font-size:18px;font-weight:700;letter-spacing:.5px;}
.app-desc{font-size:12px;color:rgba(255,255,255,0.55);margin-top:3px;}
.footer{margin-top:36px;font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:2px;text-transform:uppercase;}
</style>
</head>
<body>
<div class="logo">
<svg width="180" height="52" viewBox="0 0 440 130" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto 4px;">
  <defs>
    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00AAFF"/><stop offset="100%" stop-color="#003b8e"/></linearGradient>
    <linearGradient id="ig" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a3a6e"/><stop offset="100%" stop-color="#0d2550"/></linearGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="url(#rg)"/>
  <circle cx="60" cy="60" r="42" fill="url(#ig)"/>
  <circle cx="60" cy="60" r="42" fill="none" stroke="#0057d9" stroke-width="2"/>
  <path d="M60 18 L65 52 L60 57 L55 52 Z" fill="white"/>
  <path d="M60 102 L65 68 L60 63 L55 68 Z" fill="white"/>
  <path d="M102 60 L68 55 L63 60 L68 65 Z" fill="#00AAFF"/>
  <path d="M18 60 L52 55 L57 60 L52 65 Z" fill="#00AAFF"/>
  <circle cx="60" cy="60" r="7" fill="#00AAFF"/>
  <circle cx="60" cy="60" r="3" fill="#0d2550"/>
  <text x="132" y="52" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="36" font-weight="900" letter-spacing="4" fill="#00AAFF">CLIMAX</text>
  <text x="132" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="6" fill="rgba(255,255,255,0.4)">SERVICE</text>
</svg>
<div class="subtitulo">Sistema interno</div>
</div>

<div class="apps">
  <a class="app-btn" href="https://crassol-lab.github.io/Gastos-climax/agenda/">
    <div class="app-icon">📅</div>
    <div class="app-info">
      <div class="app-nombre">Agenda</div>
      <div class="app-desc">Turnos y calendario</div>
    </div>
  </a>
  <a class="app-btn" href="https://crassol-lab.github.io/Gastos-climax/">
    <div class="app-icon">💰</div>
    <div class="app-info">
      <div class="app-nombre">Gastos</div>
      <div class="app-desc">Registro de gastos</div>
    </div>
  </a>
  <a class="app-btn" href="https://crassol-lab.github.io/informe-t-cnico-climax/">
    <div class="app-icon">📋</div>
    <div class="app-info">
      <div class="app-nombre">Informes</div>
      <div class="app-desc">Informes técnicos</div>
    </div>
  </a>
</div>

<div class="footer">Uso interno · Climax Service</div>
</body>
</html>
